<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Maya — The AI that actually knows you{% endblock %}</title>
    <meta name="description" content="Maya is the smartest friend in your Telegram contacts. No app to download. No account to create. Just text her.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coral: '#E8735A',
                        'coral-dark': '#D4614A',
                        cream: '#FFF5EB',
                        teal: '#1A7A6D',
                        'teal-dark': '#14625A',
                        charcoal: '#2D2D2D',
                        muted: '#8C8585',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-cream text-charcoal">
    <!-- Nav -->
    <nav class="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between">
        <a href="/" class="text-2xl font-bold text-coral">Maya</a>
        <div class="flex items-center gap-6">
            <a href="/pricing" class="text-muted hover:text-charcoal transition">Pricing</a>
            <a href="https://t.me/MayaAIBot" class="bg-coral text-white px-5 py-2.5 rounded-full font-medium hover:bg-coral-dark transition">
                Text Maya
            </a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="max-w-5xl mx-auto px-6 py-12 border-t border-muted/20">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-muted text-sm">&copy; 2026 Maya. All rights reserved.</div>
            <div class="flex gap-6 text-sm text-muted">
                <a href="/privacy" class="hover:text-charcoal transition">Privacy</a>
                <a href="/terms" class="hover:text-charcoal transition">Terms</a>
                <a href="/pricing" class="hover:text-charcoal transition">Pricing</a>
            </div>
        </div>
    </footer>
</body>
</html>
